name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write
  actions: read

jobs:
  claude-review:
    uses: 0xPolygon/pipelines/.github/workflows/apps-claude-code-review.yml@main
    secrets:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
