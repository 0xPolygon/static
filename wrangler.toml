# Cloudflare Workers static-assets deployment for the static.polygon.technology
# HTTP endpoint. No worker script — Cloudflare serves the assembled dist/ bundle
# (network/ JSON tree + health-check index.html + _headers) directly from its
# edge. Replaces the previous nginx-on-ECS origin; the npm package
# (@polygonlabs/meta, packages/meta/) is a separate surface and unaffected.
name = "polygon-static"
compatibility_date = "2026-06-24"
placement = { mode = "smart" }
workers_dev = false
preview_urls = false
send_metrics = false

[assets]
directory = "./dist"
# Missing paths return a real 404 (a JSON CDN, not an SPA). The old nginx
# try_files fell back to index.html, masking 404s as 200+HTML.
not_found_handling = "none"

[build]
command = "pnpm run build:cdn"

# Validation domain — a fresh hostname, so wrangler creates its DNS record itself.
# custom_domain only works from CI when NO record pre-exists; on a hostname with an
# existing externally-managed record it fails with code 100117, our CI token cannot
# override (no Zone:DNS:Edit), and zone routes fail likewise (SPEC has tried).
[env.staging]
routes = [{ pattern = "static-cf.polygon.technology", custom_domain = true }]

# Apex. The worker (polygon-static-production) is deployed and unbound; the
# static.polygon.technology record still points at AWS (externally managed), so no
# wrangler-side binding can take it over from CI (see staging note). Until SPEC
# swaps the record onto the worker in the CF dashboard, a production deploy fails
# harmlessly at the domain-registration step (code 100117) — the script deploys
# before domain registration, so nothing already deployed or bound is touched.
# After the swap, this config matches the dashboard state and deploys idempotently
# own the domain.
[env.production]
routes = [{ pattern = "static.polygon.technology", custom_domain = true }]
